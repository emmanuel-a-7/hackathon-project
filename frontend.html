<!DOCTYPE html>
<html>

<head>
    <title>Apple Hardware Analyser</title>
    <!-- Link the CSS file correctly from Flask's static folder -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" id="navbar__logo">Apple Hardware Diagnosis</a>
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item"><a href="/" class="navbar__links">Diagnose</a></li>
                <li class="navbar__item"><a href="/about.html" class="navbar__links">About</a></li>
            </ul>
        </div>
    </nav>

    <h1>Apple Hardware Analyser</h1>

    <p>Determines if your broken device has an easy fix, and can be kept out of the ever-growing e-waste landfills.</p>

    <form method="POST" action="/">
        <label for="device_type">SELECT DEVICE:</label>
        <select name="device_type" id="device_type" required>
            <option value="macbook">Apple MacBook / Mac</option>
            <option value="iphone">Apple iPhone / iPad</option>
        </select>

        <br><br>

        <label for="user_question">SELECT YOUR ISSUE:</label>
        <select name="user_question" id="user_question" required>
            <!-- Javascript will populate this -->
        </select>

        <div id="custom_input_block" style="display:none; margin-top:15px;">
            <textarea name="custom_query" placeholder="Describe your issue in simple words..." rows="5"
                cols="40"></textarea>
        </div>



        <br><br>
        <button type="submit">Analyze</button>
    </form>

    <div id="loading-indicator" style="display: none; margin-top: 20px;">
        <p><i>Scanning Neural Cloud... please wait.</i></p>
    </div>

    <div id="output-container" style="display: none; margin-top: 20px;">
        <h2>Output:</h2>
        <pre id="api-output" style="white-space: pre-wrap; font-family: monospace;"></pre>
    </div>

    <script>
        const allOptions = {
            "macbook": [
                { value: "flashing folder", text: "Blinking folder with question mark (Can't find hard drive)" },
                { value: "circle with slash", text: "Circle with a slash symbol (Software corrupted)" },
                { value: "padlock icon", text: "Padlock screen on startup (Firmware locked)" },
                { value: "kernel panic", text: "Computer randomly restarts saying 'Because of a problem'" },
                { value: "target disk mode", text: "Stuck on floating lightning bolt/firewire logo" },
                { value: "1 beep", text: "1 Beep every 5 seconds (Missing memory)" },
                { value: "3 beeps", text: "3 Beeps on startup (Memory failure)" },
                { value: "sos beeps", text: "3 quick, 3 long, 3 quick beeps (Software rescue mode)" },
                { value: "flexgate", text: "Screen backlight is uneven or goes dark when opened too far" },
                { value: "fan spin no chime", text: "Fans spin super loud but screen is black and no sound" }
            ],
            "iphone": [
                { value: "error 4013", text: "Constant Restarting / Error 4013 (Stuck turning on)" },
                { value: "error 9", text: "Fails to update with Error 9 (Storage chip dead)" },
                { value: "error 14", text: "Update gets stuck with Error 14 (Storage is 100% full)" },
                { value: "error 4014", text: "Error 4014 on computer (Main processor dead)" },
                { value: "error -1", text: "Error -1 on computer (Cellular modem broken)" },
                { value: "boot loop", text: "Apple logo shows up, then goes black, forever (Boot loop)" },
                { value: "panic full", text: "Phone randomly turns off while using it (Panic full)" },
                { value: "no face id", text: "Face ID is not available warning" },
                { value: "important battery message", text: "Important Battery Message (Unknown part)" },
                { value: "no service", text: "Says 'No Service' even with no SIM card" },
                { value: "pink screen", text: "Screen flashes bright pink before restarting" },
                { value: "ghost touch", text: "Screen clicks and types all by itself (Ghost touch)" },
                { value: "green line", text: "Bright green vertical line stuck on screen" },
                { value: "unable to activate", text: "Stuck on 'Unable to Activate' during setup" },
                { value: "audio ic disease", text: "Voice Memos greyed out, calls don't work (Audio IC)" }
            ]
        };

        const deviceSelect = document.getElementById('device_type');
        const issueSelect = document.getElementById('user_question');
        const customBlock = document.getElementById('custom_input_block');

        function updateIssues() {
            // Clear out existing options
            issueSelect.innerHTML = '';

            // Get selected device
            const device = deviceSelect.value;
            const options = allOptions[device] || [];

            // Populate new options
            options.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt.value;
                el.textContent = opt.text;
                issueSelect.appendChild(el);
            });

            // Add the custom override option at the bottom
            const customEl = document.createElement('option');
            customEl.value = 'custom_cloud';
            customEl.textContent = 'My issue is not listed here (I will type it)';
            issueSelect.appendChild(customEl);

            // Trigger change event to update the textarea visibility
            issueSelect.dispatchEvent(new Event('change'));
        }

        // Listeners
        deviceSelect.addEventListener('change', updateIssues);

        issueSelect.addEventListener('change', function () {
            customBlock.style.display = this.value === 'custom_cloud' ? 'block' : 'none';
        });

        // Run once on load to populate the first time
        updateIssues();

        // --- NEW AJAX SUBMISSION LOGIC ---
        const form = document.querySelector('form');
        const analyzeBtn = document.querySelector('button[type="submit"]');
        const outputContainer = document.getElementById('output-container');
        const apiOutput = document.getElementById('api-output');
        const loadingIndicator = document.getElementById('loading-indicator');

        form.addEventListener('submit', async function (e) {
            e.preventDefault(); // Prevent the page from reloading

            // Show loading state and disable button
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = "Analyzing...";
            outputContainer.style.display = 'none';
            loadingIndicator.style.display = 'block';

            // Gather form data
            const formData = new FormData(form);

            try {
                // Send request to Flask backend
                const response = await fetch('/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                // Hide loading, show result
                loadingIndicator.style.display = 'none';
                apiOutput.textContent = data.response;
                outputContainer.style.display = 'block';

            } catch (error) {
                loadingIndicator.style.display = 'none';
                apiOutput.textContent = "Error connecting to server. Please try again.";
                outputContainer.style.display = 'block';
            } finally {
                // Reset button
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = "Analyze";
            }
        });
    </script>
</body>

</html>
